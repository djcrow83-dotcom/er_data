<!-- [LOGIN VIEW] -->
<div id="login-view" class="fixed inset-0 z-[10000] flex items-center justify-center bg-[#FDF6F0]">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-10 border border-[#E8DDD4] relative">
        <div class="absolute top-0 left-0 w-full h-1.5 bg-[#D97756]"></div>
        <div class="text-center mb-10">
            <div
                class="mx-auto w-16 h-16 bg-[#D97756] rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-[#F0C9B8]">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
                    </path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-[#3D2E24] tracking-tight">ER 처리 현황 시스템</h1>
            <p class="text-[#8B7B6E] mt-2 text-sm" id="auth-status-msg">인증 상태 확인 중...</p>
        </div>
        <div class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-[#6B5D52] mb-1.5 ml-1">이메일 계정</label>
                <input type="email" id="loginId"
                    class="w-full px-4 py-3 bg-[#FAF3EE] border border-[#E8DDD4] rounded-lg focus:outline-none focus:border-[#D97756] text-[#3D2E24]"
                    placeholder="admin@example.com"
                    onkeyup="if(event.key==='Enter') document.getElementById('loginPw').focus()">
            </div>
            <div>
                <label class="block text-xs font-bold text-[#6B5D52] mb-1.5 ml-1">비밀번호</label>
                <input type="password" id="loginPw"
                    class="w-full px-4 py-3 bg-[#FAF3EE] border border-[#E8DDD4] rounded-lg focus:outline-none focus:border-[#D97756] text-[#3D2E24]"
                    placeholder="Password" onkeyup="if(event.key==='Enter') window.loginSystem()">
            </div>
            <button onclick="window.loginSystem()" id="loginBtn"
                class="w-full py-3.5 bg-[#D97756] hover:bg-[#C4623E] text-white font-bold rounded-lg transition-colors shadow-md mt-4 flex items-center justify-center gap-2 group"
                disabled>
                <span>안전하게 로그인</span>
                <svg class="w-4 h-4 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3">
                    </path>
                </svg>
            </button>
        </div>
        <div class="mt-8 pt-6 border-t border-[#FAF3EE] text-center">
            <p class="text-xs text-[#B8A99C]">시스템 문의: <span class="font-bold text-[#8B7B6E]">IT 지원팀</span></p>
        </div>
    </div>
</div>
