<!-- Main Content -->
<main class="flex-grow overflow-y-auto custom-scrollbar max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-8 w-full">
    <div id="dashboard" class="space-y-4 animate-fade-in">

        <!-- [UI개선1] 핵심 숫자 바 -->
        <section class="bg-white rounded-lg shadow-sm border border-[#E8DDD4] px-5 py-3">
            <div class="flex items-center gap-3 flex-wrap">
                <div onclick="filterByTotal()"
                    class="flex items-center gap-2 px-3 py-1.5 bg-[#FAF3EE] hover:bg-[#F5EDE6] rounded-md cursor-pointer transition-colors border border-[#E8DDD4]">
                    <span class="text-xs font-medium text-[#8B7B6E]">전체</span>
                    <span class="text-sm font-bold text-[#3D2E24]" id="quickTotal">0</span>
                </div>
                <div onclick="filterByUnprocessed()"
                    class="flex items-center gap-2 px-3 py-1.5 bg-[#FFF5EB] hover:bg-[#FFECD9] rounded-md cursor-pointer transition-colors border border-[#E8D0B8]">
                    <span class="text-xs font-medium text-[#A67A52]">미처리</span>
                    <span class="text-sm font-bold text-[#8B5E3C]" id="quickUnprocessed">0</span>
                </div>
                <div onclick="filterByUrgent()"
                    class="flex items-center gap-2 px-3 py-1.5 bg-[#FFF0EC] hover:bg-[#FFE4DD] rounded-md cursor-pointer transition-colors border border-[#E8C0B4]">
                    <span class="text-xs font-medium text-[#B85C4A]">장기미처리</span>
                    <span class="text-sm font-bold text-[#944839]" id="quickUrgent">0</span>
                </div>
                <div class="flex items-center gap-2 px-3 py-1.5 bg-[#F2F0E8] rounded-md border border-[#DDD9CE]">
                    <span class="text-xs font-medium text-[#6B7B5E]">처리완료</span>
                    <span class="text-sm font-bold text-[#4D5E3E]" id="quickCompleted">0</span>
                </div>
                <div class="h-5 w-px bg-[#E8DDD4] mx-1"></div>
                <div class="flex items-center gap-2 px-3 py-1.5 bg-[#FDF0EB] rounded-md border border-[#F0C9B8]">
                    <span class="text-xs font-medium text-[#D97756]">환불총액</span>
                    <span class="text-sm font-bold text-[#C4623E]" id="quickRefundTotal">₩0</span>
                </div>
            </div>
        </section>

        <!-- 현황 대시보드 -->
        <section class="bg-white rounded-lg shadow-sm border border-[#E8DDD4] overflow-hidden">
            <button onclick="toggleDashboard()"
                class="w-full px-6 py-3 flex justify-between items-center bg-[#FAF3EE] hover:bg-[#F5EDE6] transition-colors text-left group">
                <div class="flex items-center gap-2">
                    <div
                        class="p-1.5 bg-white rounded-md border border-[#E8DDD4] text-[#D97756] shadow-sm group-hover:border-[#E8B4A0] transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 002 2h2a2 2 0 002-2z">
                            </path>
                        </svg>
                    </div>
                    <h3 class="text-base font-bold text-[#3D2E24]">현황 대시보드</h3>
                </div>
                <div class="flex items-center gap-2 text-[#B8A99C]">
                    <span class="text-xs font-medium">열기/닫기</span>
                    <svg id="dashboardArrow" class="w-5 h-5 transform transition-transform duration-200" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                    </svg>
                </div>
            </button>

            <div id="dashboardContent" class="hidden border-t border-[#E8DDD4] bg-white animate-fade-in">
                <!-- KPI 카드 -->
                <div id="kpiContent" class="p-6 bg-[#FAF3EE]/50">
                    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-4 gap-4">
                        <div onclick="filterByTotal()"
                            class="bg-white p-4 rounded-lg shadow-sm border-l-4 border-[#6B5D52] clickable-card card-hover"
                            title="전체 건 보기">
                            <div class="flex flex-col h-full justify-between">
                                <p class="text-xs font-bold text-[#6B5D52] uppercase tracking-wider mb-2">전체 건수
                                </p>
                                <h3 class="text-2xl font-bold text-[#3D2E24]" id="kpiTotal">0</h3>
                            </div>
                        </div>
                        <div onclick="filterByUnprocessed()"
                            class="bg-white p-4 rounded-lg shadow-sm border-l-4 border-[#8B7B6E] clickable-card card-hover"
                            title="미처리 건만 보기">
                            <div class="flex flex-col h-full justify-between">
                                <p class="text-xs font-bold text-[#8B7B6E] uppercase tracking-wider mb-2">미처리 건수
                                </p>
                                <h3 class="text-2xl font-bold text-[#3D2E24]" id="kpiUnprocessed">0</h3>
                            </div>
                        </div>
                        <div onclick="filterByUrgent()"
                            class="bg-white p-4 rounded-lg shadow-sm border-l-4 border-[#B85C4A] clickable-card card-hover"
                            title="장기 미처리 건만 보기">
                            <div class="flex flex-col h-full justify-between">
                                <p class="text-xs font-bold text-[#B85C4A] uppercase tracking-wider mb-2">장기 미처리
                                </p>
                                <h3 class="text-2xl font-bold text-[#3D2E24]" id="kpiUrgent">0</h3>
                            </div>
                        </div>
                        <div onclick="filterByDefect()"
                            class="bg-white p-4 rounded-lg shadow-sm border-l-4 border-[#C4623E] clickable-card card-hover"
                            title="불량 건만 보기">
                            <div class="flex flex-col h-full justify-between">
                                <p class="text-xs font-bold text-[#C4623E] uppercase tracking-wider mb-2">불량 판정
                                </p>
                                <h3 class="text-2xl font-bold text-[#3D2E24]" id="kpiDefect">0</h3>
                            </div>
                        </div>
                        <div onclick="filterByMisdelivery()"
                            class="bg-white p-4 rounded-lg shadow-sm border-l-4 border-[#A67A52] clickable-card card-hover"
                            title="오배송 건만 보기">
                            <div class="flex flex-col h-full justify-between">
                                <p class="text-xs font-bold text-[#A67A52] uppercase tracking-wider mb-2">오배송
                                </p>
                                <h3 class="text-2xl font-bold text-[#3D2E24]" id="kpiMisdelivery">0</h3>
                            </div>
                        </div>
                        <div onclick="filterByExchange()"
                            class="bg-white p-4 rounded-lg shadow-sm border-l-4 border-sky-500 clickable-card card-hover"
                            title="교환 건만 보기">
                            <div class="flex flex-col h-full justify-between">
                                <p class="text-xs font-bold text-sky-500 uppercase tracking-wider mb-2">교환 건수
                                </p>
                                <h3 class="text-2xl font-bold text-[#3D2E24]" id="kpiExchangeRate">0</h3>
                            </div>
                        </div>
                        <div onclick="filterByReturn()"
                            class="bg-white p-4 rounded-lg shadow-sm border-l-4 border-[#D97756] clickable-card card-hover"
                            title="반품 건만 보기">
                            <div class="flex flex-col h-full justify-between">
                                <p class="text-xs font-bold text-[#D97756] uppercase tracking-wider mb-2">반품 건수
                                </p>
                                <h3 class="text-2xl font-bold text-[#3D2E24]" id="kpiReturnRate">0</h3>
                            </div>
                        </div>
                        <div class="bg-white p-4 rounded-lg shadow-sm border-l-4 border-[#B8A060]">
                            <div class="flex flex-col h-full justify-between">
                                <p class="text-xs font-bold text-[#A6905A] uppercase tracking-wider mb-2">불량률
                                </p>
                                <h3 class="text-2xl font-bold text-[#3D2E24]" id="kpiDefectRate">0%</h3>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="border-t border-[#E8DDD4]"></div>
                <!-- 환불액 추이 -->
                <div class="p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h4 class="text-sm font-bold text-[#5C4A3E]">환불액 추이</h4>
                        <div class="bg-[#F5EDE6] p-1 rounded-lg flex text-xs font-bold">
                            <button onclick="setChartPeriod('daily')" id="btn-chart-daily"
                                class="px-3 py-1.5 rounded-md transition-colors bg-white text-[#D97756] shadow-sm">일간</button>
                            <button onclick="setChartPeriod('weekly')" id="btn-chart-weekly"
                                class="px-3 py-1.5 rounded-md transition-colors text-[#8B7B6E] hover:bg-white/50">주간</button>
                            <button onclick="setChartPeriod('monthly')" id="btn-chart-monthly"
                                class="px-3 py-1.5 rounded-md transition-colors text-[#8B7B6E] hover:bg-white/50">월간</button>
                        </div>
                    </div>
                    <div id="refundChartContent">
                        <div id="refundDataContainer" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3">
                        </div>
                    </div>
                </div>
                <div class="border-t border-[#E8DDD4]"></div>
                <!-- 사유별 현황판 -->
                <div class="p-6">
                    <div class="mb-4 flex justify-between items-center">
                        <h4 class="text-sm font-bold text-[#5C4A3E]">사유별 현황판</h4>
                        <button onclick="filterByTotal()"
                            class="text-xs text-[#8B7B6E] hover:text-[#D97756] underline flex items-center gap-1">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M6 18L18 6M6 6l12 12"></path>
                            </svg>
                            초기화
                        </button>
                    </div>
                    <div id="reasonFilterContent">
                        <div id="reasonButtons" class="flex flex-wrap gap-2"></div>
                    </div>
                </div>
            </div>
        </section>
